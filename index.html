<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TenderTrack</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23166534'/><text x='50' y='55' text-anchor='middle' dominant-baseline='central' font-size='50' fill='%2322c55e'>TT</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23166534'/><text x='50' y='55' text-anchor='middle' dominant-baseline='central' font-size='50' fill='%2322c55e'>TT</text></svg>">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#4a4e54;--card:rgba(40,44,50,.93);--card2:rgba(55,60,68,.88);--border:rgba(90,100,110,.45);--accent:#22c55e;--blue:#3b82f6;--green:#22c55e;--warn:#f59e0b;--danger:#ef4444;--orange:#f97316;--violet:#8b5cf6;--text:#e2e8f0;--muted:#a0aab8;--amber:#fbbf24}
body{background:#5a5e64;background-image:url("data:image/svg+xml,%3Csvg width='6' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='6' height='6' fill='%23555960'/%3E%3Cpath d='M0 0L6 6' stroke='%235f636a' stroke-width='.7'/%3E%3Cpath d='M6 0L0 6' stroke='%234e5258' stroke-width='.7'/%3E%3C/svg%3E");color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-bottom:60px}
#app{max-width:800px;margin:0 auto}

/* Header */
#header{background:rgba(30,33,38,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(34,197,94,.2);padding:12px 16px;position:sticky;top:0;z-index:50}
.top-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.logo{font-size:18px;font-weight:800;color:#22c55e;cursor:pointer;display:flex;align-items:center;gap:8px}
.logo-ico{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#166534,#22c55e);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff}
.logo-sub{font-size:10px;color:var(--muted);margin-top:1px}
.dev-credit{font-size:13px;font-weight:800;background:linear-gradient(90deg,#22c55e,#38bdf8,#a78bfa,#f472b6,#22c55e);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shine 3s linear infinite}
@keyframes shine{0%{background-position:0% center}100%{background-position:200% center}}
.header-btns{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.hbtn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:8px;color:#dde3ec;cursor:pointer;padding:5px 10px;font-size:12px;white-space:nowrap;transition:all .2s;backdrop-filter:blur(4px)}
.hbtn:hover{border-color:var(--accent);color:var(--accent);background:rgba(34,197,94,.15)}
.hbtn.active{border-color:var(--accent);background:rgba(34,197,94,.22);color:var(--accent);font-weight:700}
.hbtn.blue{border-color:rgba(59,130,246,.5);color:#60a5fa;background:rgba(59,130,246,.12)}
.hbtn.blue:hover{background:rgba(59,130,246,.2)}
.hbtn.amber{border-color:rgba(251,191,36,.5);color:#fbbf24;background:rgba(251,191,36,.1)}

/* Search */
.search-wrap{position:relative;margin-top:10px}
.search-wrap input{width:100%;background:rgba(255,255,255,.08);border:1.5px solid rgba(34,197,94,.35);border-radius:12px;padding:11px 90px 11px 38px;color:#fff;font-size:15px;outline:none;transition:border .2s}
.search-wrap input:focus{border-color:var(--accent);background:rgba(255,255,255,.12)}
.search-wrap input::placeholder{color:#8899aa}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
.pin-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;display:none}
.mode-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.mode-btn{padding:4px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#c0c8d4;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.mode-btn.active{border-color:var(--accent);background:rgba(34,197,94,.2);color:var(--accent)}
.pinned-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(34,197,94,.12);border:1px solid var(--accent);border-radius:20px;font-size:13px;color:var(--accent);margin:8px 0}
.pinned-tag .x{cursor:pointer;font-size:16px;font-weight:700;color:var(--muted);margin-left:4px}
.pinned-tag .x:hover{color:var(--danger)}

/* Body */
#body{padding:12px 16px 0}

/* Start screen */
#start-screen{text-align:center;padding:50px 20px}
.start-title{font-size:22px;font-weight:800;margin-bottom:4px}
.start-sub{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.big-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 28px;border-radius:14px;border:none;background:linear-gradient(135deg,#166534,#22c55e);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:12px;transition:opacity .2s}
.big-btn:disabled{opacity:.5}
.or-div{text-align:center;color:var(--muted);font-size:12px;margin:12px 0;position:relative}
.or-div::before,.or-div::after{content:"";position:absolute;top:50%;width:38%;height:1px;background:var(--border)}
.or-div::before{left:0}.or-div::after{right:0}
.upload-zone{border:2px dashed rgba(255,255,255,.2);border-radius:14px;padding:16px;text-align:center;cursor:pointer;background:rgba(255,255,255,.04);font-size:13px;color:var(--muted);margin-bottom:8px;transition:border .2s}
.upload-zone:hover{border-color:var(--accent)}
.upload-zone.done{border-color:var(--green);border-style:solid}
.hint-box{padding:14px;background:var(--card);border-radius:12px;border:1px solid var(--border);font-size:12px;color:var(--muted);margin-top:16px;line-height:1.6}
.err-box{margin-top:10px;padding:10px 14px;background:rgba(239,68,68,.1);border:1px solid var(--danger);border-radius:10px;color:var(--danger);font-size:13px}

/* Stats */
.stats-bar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
@media(max-width:640px){.stats-bar{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:rgba(20,24,30,.85);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s}
.stat-card:hover{border-color:var(--accent);background:rgba(34,197,94,.1)}
.stat-card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);background:rgba(34,197,94,.15)}
.stat-num{font-size:18px;font-weight:800}
.stat-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

/* Sort & export row */
.sort-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:4px}
.sort-btns{display:flex;gap:4px;align-items:center;font-size:12px;color:var(--muted);overflow-x:auto}
.sort-btn{padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#b0b8c4;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s}
.sort-btn.active{border-color:var(--accent);background:rgba(34,197,94,.2);color:var(--accent)}
.export-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center;font-size:11px}
.exp-btn{padding:5px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);cursor:pointer;font-weight:600;font-size:11px;transition:all .15s}

/* Cards */
.card{background:rgba(42,46,52,.9);border:1px solid rgba(255,255,255,.1);border-radius:12px;margin-bottom:6px;overflow:hidden;cursor:pointer;transition:border .15s}
.card:hover{border-color:rgba(255,255,255,.22)}
.card.conflict{border-color:rgba(251,191,36,.4)}
.card.expanded{border-color:var(--accent)}
.card-head{padding:10px 12px}
.card-top{display:flex;align-items:flex-start;gap:8px}
.pill-ico{width:28px;height:28px;flex-shrink:0;margin-top:2px}
.card-info{flex:1;min-width:0}
.drug-name{font-size:13px;font-weight:700;color:var(--accent);line-height:1.35}
.mnn-line{font-size:10px;color:var(--muted);font-style:italic;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conflict-hint{font-size:10px;color:var(--amber);margin-top:2px}
.chosen-hint{font-size:10px;color:var(--accent);margin-top:2px}
.card-qty{text-align:right;flex-shrink:0}
.card-qty .num{font-size:15px;font-weight:700}
.card-qty .unit{font-size:10px;color:var(--muted)}
.bar-wrap{display:flex;align-items:center;gap:8px;margin-top:6px;padding:0 12px 0 48px}
.bar-bg{flex:1;height:5px;background:#374151;border-radius:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:10px;transition:width .3s}
.bar-pct{font-size:11px;color:var(--muted);flex-shrink:0}

/* Card detail */
.card-detail{padding:0 12px 12px;border-top:1px solid var(--border);margin-top:6px;display:none}
.card.expanded .card-detail{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:10px 0}
.mini-stat{background:rgba(255,255,255,.06);border-radius:8px;padding:8px 10px}
.mini-stat .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.mini-stat .val{font-size:14px;font-weight:600;margin-top:2px}
.mini-stat .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.supplier-pick{margin:8px 0 10px}
.supplier-pick .title{font-size:12px;color:var(--amber);font-weight:600;margin-bottom:6px}
.supplier-pick .btns{display:flex;flex-wrap:wrap;gap:4px}
.sup-btn{padding:5px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:var(--muted);font-size:11px;cursor:pointer;transition:all .15s}
.sup-btn.active{border-color:var(--accent);background:rgba(34,197,94,.18);color:var(--accent)}
.alloc-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:12px}
.alloc-row .sup-name{flex:1;min-width:0;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.alloc-row .alloc-cap{color:var(--muted);font-size:10px;flex-shrink:0}
.alloc-input{width:70px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:4px 6px;color:#fff;font-size:12px;text-align:right;outline:none}
.alloc-input:focus{border-color:var(--accent)}
.alloc-apply{padding:4px 12px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:11px;font-weight:600;cursor:pointer;margin-top:4px}
.tender-card{background:rgba(255,255,255,.06);border-radius:8px;padding:8px 10px;margin-top:6px;border-left:3px solid var(--accent)}
.tender-card .sup{font-size:13px;font-weight:600;color:var(--accent)}
.tender-card .con{font-size:11px;color:var(--muted);margin-top:2px}
.tender-card .comm{font-size:11px;color:var(--text);margin-top:4px;font-style:italic}
.tender-card .row{display:flex;justify-content:space-between;font-size:12px;margin-top:3px}

/* Agreements */
.agr-card{background:rgba(35,38,43,.88);border:1px solid rgba(255,255,255,.08);border-radius:12px;margin-bottom:6px;padding:12px;cursor:pointer;transition:border .15s}
.agr-card:hover{border-color:rgba(255,255,255,.2)}
.agr-card.expanded{border-color:var(--accent)}
.agr-sup{font-size:15px;font-weight:700;color:var(--accent)}
.agr-con{font-size:12px;color:var(--muted);margin-top:2px}
.agr-meta{display:flex;gap:12px;margin-top:6px;font-size:12px;color:var(--muted)}
.agr-detail{border-top:1px solid var(--border);margin-top:8px;padding-top:8px;display:none}
.agr-card.expanded .agr-detail{display:block}
.agr-item{padding:6px 0;border-bottom:1px solid rgba(51,65,85,.4);font-size:12px}
.agr-item:last-child{border-bottom:none}
.agr-item .name{font-weight:600;margin-bottom:2px;color:var(--accent)}
.agr-item .mnn{font-size:10px;color:var(--muted);font-style:italic;margin-bottom:3px}
.agr-item .row{display:flex;justify-content:space-between;margin-top:2px}

/* Conflicts page */
.conflict-banner{padding:10px 14px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);border-radius:12px;font-size:13px;color:#fcd34d;margin-bottom:12px}
.conflict-card{background:rgba(35,38,43,.88);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px;margin-bottom:8px}
.conflict-drug{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px}
.conflict-meta{font-size:11px;color:var(--muted);margin-bottom:8px}
.conflict-opt{padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);margin-bottom:4px;cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center}
.conflict-opt:hover{border-color:var(--accent)}
.conflict-opt.chosen{border-color:var(--accent);background:rgba(34,197,94,.12)}
.conflict-opt .name{font-size:13px;font-weight:600}
.conflict-opt .info{font-size:10px;color:var(--muted);margin-top:2px}
.conflict-opt .check{color:var(--accent);font-size:16px;flex-shrink:0}

.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}

mark{background:rgba(250,204,21,.5);color:inherit;border-radius:2px;padding:0 2px}

/* Loader */
#loader{display:none;text-align:center;padding:60px 20px;color:var(--muted)}
.loader-ico{font-size:44px;margin-bottom:14px}
.loader-spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Hide/show */
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="top-row">
      <div>
        <div class="logo" onclick="goHome()"><div class="logo-ico">TT</div><div><span style="color:var(--accent)">Tender</span><span style="color:#a3e635">Track</span></div></div>
        <div class="dev-credit">Developed by Ostap Khmil</div>
      </div>
      <div class="header-btns hidden" id="nav-btns">
        <button class="hbtn active" id="btn-monitor" onclick="switchView('monitor')">Моніторинг</button>
        <button class="hbtn" id="btn-agreements" onclick="switchView('agreements')">Угоди</button>
        <button class="hbtn amber hidden" id="btn-conflicts" onclick="switchView('conflicts')">⚡ <span id="conflict-count">0</span></button>
        <button class="hbtn blue" onclick="loadFromDrive(true)">☁️ Оновити</button>
        <button class="hbtn" onclick="showManualUpload()">📂</button>
      </div>
    </div>
    <div id="search-area" class="hidden">
      <div class="mode-row" id="mode-row">
        <button class="mode-btn active" onclick="setMode('name',this)">Назва</button>
        <button class="mode-btn" onclick="setMode('mnn',this)">МНН</button>
        <button class="mode-btn" onclick="setMode('supplier',this)">Постачальник</button>
        <button class="mode-btn" onclick="setMode('contract',this)">Угода</button>
      </div>
      <div id="pinned-wrap" class="hidden"></div>
      <div class="search-wrap" id="search-wrap">
        <span class="search-ico">🔍</span>
        <input id="search-input" placeholder="Назва препарату..." oninput="onSearchInput(this.value)" onkeydown="if(event.key==='Enter')pinSearch()">
        <button class="pin-btn" id="pin-btn" onclick="pinSearch()">📌 Закріпити</button>
      </div>
    </div>
  </div>
  <div id="body">
    <div id="start-screen">
      <div style="width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,#166534,#22c55e);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:#fff;margin:0 auto 16px;box-shadow:0 8px 32px rgba(34,197,94,.3)">TT</div>
      <div class="start-title"><span style="color:var(--accent)">Tender</span><span style="color:#a3e635">Track</span></div>
      <div class="dev-credit" style="font-size:18px;margin-bottom:6px">Developed by Ostap Khmil</div>
      <div class="start-sub">Моніторинг тендерних угод та закупівель</div>
      <button class="big-btn" id="drive-btn" onclick="loadFromDrive(false)">☁️ Завантажити актуальні дані</button>
      <div class="or-div">або завантажити файли вручну</div>
      <div class="upload-zone" id="uz-manual" onclick="showManualFields()">📂 Завантажити .xlsx файли з пристрою</div>
      <div id="manual-fields" class="hidden">
        <div class="upload-zone" id="uz-p" onclick="event.stopPropagation();document.getElementById('file-p').click()">
          <input id="file-p" type="file" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this.files[0],'p')">
          + 1. Закупівлі (з 1С)
        </div>
        <div class="upload-zone" id="uz-t" onclick="event.stopPropagation();document.getElementById('file-t').click()">
          <input id="file-t" type="file" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this.files[0],'t')">
          + 2. Тендерні угоди
        </div>
      </div>
      <div id="start-error"></div>
    </div>
    <div id="loader"><div class="loader-ico"><span class="loader-spin">⟳</span></div><div id="loader-text">Завантаження...</div></div>
    <div id="main-screen" class="hidden"></div>
  </div>
</div>

<script>
// ═══════ CONFIG ═══════
const GDRIVE_P = "https://docs.google.com/spreadsheets/d/1wcVo31MfSOhMDBe2Fz4VhHzKHf7wOpxN/export?format=xlsx";
const GDRIVE_T = "https://docs.google.com/spreadsheets/d/1gd8kH1DktGNZfX-XrjdaSlzorls3XTxf/export?format=xlsx";
const CACHE_KEY = "tendertrack_v19";

// ═══════ STATE ═══════
let allData=[], allTenders=[], overrides={};
let currentView="monitor", searchMode="name", currentSearch="", pinnedSearch="";
let currentFilter="all", currentSort="status";
let expandedCard=null, expandedAgr=null;
let purchasesRaw=null, tendersRaw=null;
let parsedPurchases=null; // cached parsed purchases for re-matching
let lastUpdated=null;
let showAllCards=false;
function toggleFilter(k){
  if(k==="all"){if(currentFilter==="all"){showAllCards=!showAllCards}else{currentFilter="all";showAllCards=true}}
  else{showAllCards=false;currentFilter=currentFilter===k?"all":k}
  render();
}

// ═══════ CACHE ═══════
function saveCache(){
  // Always save overrides separately (small, reliable)
  try{localStorage.setItem(CACHE_KEY+"_ov",JSON.stringify(overrides))}catch{}
  try{localStorage.setItem(CACHE_KEY,JSON.stringify({data:allData,tenders:allTenders,purchases:parsedPurchases,overrides,ts:Date.now()}))}catch(e){
    console.warn("Cache full, saving without purchases",e);
    try{localStorage.setItem(CACHE_KEY,JSON.stringify({data:allData,tenders:allTenders,overrides,ts:Date.now()}))}catch(e2){
      console.warn("Cache still full, saving minimal",e2);
      try{localStorage.setItem(CACHE_KEY,JSON.stringify({data:allData,tenders:allTenders,overrides,ts:Date.now()}))}catch{}
    }
  }
}
function loadCache(){
  try{
    const r=localStorage.getItem(CACHE_KEY);if(!r)return null;
    const d=JSON.parse(r);
    // Validate structure
    if(!d||!Array.isArray(d.data)||!Array.isArray(d.tenders))return null;
    if(!d.data.length||typeof d.data[0].n!=="string")return null;
    if(!d.tenders.length||typeof d.tenders[0].supplier!=="string")return null;
    if(d.purchases&&(!Array.isArray(d.purchases)||!d.purchases.length||typeof d.purchases[0].name!=="string"))d.purchases=null;
    // Restore overrides from backup if missing
    if(!d.overrides||!Object.keys(d.overrides).length){
      try{const ovb=localStorage.getItem(CACHE_KEY+"_ov");if(ovb)d.overrides=JSON.parse(ovb)}catch{}
    }
    return d;
  }catch{return null}
}
// Clean overrides: remove entries that no longer have multiple suppliers
function cleanOverrides(data,ov){
  const valid={};
  for(const d of data){
    if(!d.multi)continue;
    const entry=ov[d.n];
    if(!entry)continue;
    if(typeof entry==="string"){
      if(d.multi.includes(entry))valid[d.n]=entry;
    }else if(typeof entry==="object"){
      // Keep allocation if at least one supplier still valid
      const cleaned={};let hasAny=false;
      for(const s of Object.keys(entry)){if(d.multi.includes(s)){cleaned[s]=entry[s];hasAny=true}}
      if(hasAny)valid[d.n]=cleaned;
    }
  }
  return valid;
}

// ═══════ XLSX PARSING ═══════
// Known dose errors in 1С data: {pattern: replacement}
const DOSE_FIXES={"10мг/мл":"0,1мг/мл"};
function fixKnownDoses(name){let n=name;for(const[from,to]of Object.entries(DOSE_FIXES))n=n.replace(from,to);return n}
function parsePurchases(buf){
  const wb=XLSX.read(buf,{type:"array"});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  // Validate: expect data rows after row 10 with columns A(name), D(date), F(unit), G(qty)
  if(rows.length<12)throw new Error("Файл закупівель: занадто мало рядків ("+rows.length+"). Очікується вивантаження з 1С.");
  let hasNumericQty=false;
  for(let i=10;i<Math.min(rows.length,20);i++){const r=rows[i];if(r&&typeof r[6]==="number")hasNumericQty=true;}
  if(!hasNumericQty)throw new Error("Файл закупівель: не знайдено числових даних у колонці G (кількість). Можливо формат файлу змінився.");
  const drugs={};
  for(let i=10;i<rows.length;i++){
    const r=rows[i];if(!r||!r[0])continue;
    const a=fixKnownDoses(String(r[0]).trim().replace(/\s+/g,' ')),d=r[3],f=r[5],g=r[6],h=r[7];
    if(g&&!d&&!f)continue;
    if(d&&f&&g&&typeof g==="number"&&!a.startsWith("Надходження")){
      if(!drugs[a])drugs[a]={unit:String(f),qty:0,sum:0};
      drugs[a].qty+=g||0;drugs[a].sum+=(typeof h==="number"?h:0);
    }
  }
  if(!Object.keys(drugs).length)throw new Error("Файл закупівель: не знайдено жодного препарату. Перевірте формат файлу.");
  return Object.entries(drugs).sort((a,b)=>a[0].localeCompare(b[0],"uk"))
    .map(([name,d])=>({name,unit:d.unit,qty:Math.round(d.qty*100)/100,sum:Math.round(d.sum*100)/100}));
}
function parseQty(v){if(typeof v==="number")return v;if(typeof v==="string"){const s=v.replace(/\u00a0/g," ").trim();if(/^\d+\.\d{3}$/.test(s))return parseInt(s.replace(".",""));const m=s.match(/^([\d\s]+)/);if(m){const n=m[1].replace(/\s/g,"");if(/^\d+$/.test(n))return parseInt(n)}}return null}
function parsePrice(v){if(typeof v==="number")return v;if(typeof v==="string"){const m=v.replace(/\u00a0/g," ").trim().match(/^([\d\s]+[.,]?\d*)/);if(m)try{return parseFloat(m[1].replace(/\s/g,"").replace(",","."))}catch{}}return null}
function parseTenders(buf){
  const wb=XLSX.read(buf,{type:"array"});
  if(!wb.SheetNames.length)throw new Error("Файл тендерів: не знайдено жодного листа.");
  const tenders=[];
  let sheetsWithContract=0;
  for(const sn of wb.SheetNames){
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:null});let contract=null;
    for(const r of rows){if(!r)continue;
      const[a,b,c,d,eR,fv,gv]=[r[0],r[1],r[2],r[3],r[4],r[5],r[6]];
      if(typeof a==="string"&&(a.includes("Договір")||a.includes("Договору"))){contract=a.trim();sheetsWithContract++;continue}
      if(!b)continue;const bs=String(b).trim();
      if(bs.includes("Найменування")||bs.includes("Міжнародна")||bs.includes("Загальна")||bs.includes("ПДВ"))continue;
      const e=parseQty(eR);if(e==null||e<=0||!c)continue;
      tenders.push({supplier:sn,contract:contract||"",mnn:bs,commercial:String(c).trim(),unit:d?String(d).trim():"",qty:e,price:parsePrice(gv)??parsePrice(fv)});
    }
  }
  if(!sheetsWithContract)throw new Error("Файл тендерів: не знайдено жодного договору. Очікуються листи з постачальниками та рядки 'Договір...'.");
  if(!tenders.length)throw new Error("Файл тендерів: не знайдено жодної позиції. Перевірте формат файлу.");
  return tenders;
}

// ═══════ MATCHING ═══════
const STOP=new Set("РОЗЧИН ДЛЯ ІНФУЗІЙ ТАБЛЕТКИ КАПСУЛИ ПОРОШОК СУСПЕНЗІЯ КОНЦЕНТРАТ ЛІОФІЛІЗАТ ВКРИТІ ПО МЛ МГ Р-Н ФЛАК АМП В У І ТА АБО ЛІОФ ПОР КРАПЛІ ОЧНІ ТАБ ЕМУЛЬС АЕРОЗОЛЬ КОНЦ СУСП КАП НАШКІРН НАШКІРНИЙ ОЧН РОЗЧ-К ПЕРЕНТЕРАЛЬНОГО ЗАСТОС".split(" "));
function norm(s){return s.toUpperCase().trim().replace(/®/g,"").replace(/\u00a0/g," ").replace(/\u0060/g,"'").replace(/\u2019/g,"'").replace(/\s*-\s*/g,"-").replace(/\s+/g," ")}
function getBrand(s){const words=norm(s).split(" "),tokens=[];for(const w of words){let c=w.replace(/[,.:;]+$/,"").replace(/\d+[%]?$/,"");if(!c)continue;if(STOP.has(c)||c.length<3){if(tokens.length)break;continue}if(/^\d+[.,]?\d*(МГ|МЛ|МКГ|%|МО|Г|Л|МГ\/МЛ)$/.test(c)||/^\d+[.,]?\d*$/.test(c)||c.startsWith("№")||c.startsWith("(")||/^МГ\/МЛ$/i.test(c)||/^МКГ\/МЛ$/i.test(c))break;tokens.push(c);if(tokens.length>=3)break}return tokens}
function stemUk(w){if(w.length<=4)return w;for(const s of["ИНУ","ІНУ","ОНУ","АТУ","ЕТУ","ИНА","ІНА","ОМ","ІМ","ОЇ","ЕЙ","ІЙ","ОГО","ОМУ","ІВ","ІН","АМ","ЯМ","У","А","Е","І","И","Ю","Я","О"])if(w.endsWith(s)&&w.length-s.length>=4)return w.slice(0,-s.length);return w}
function getForm(s){const u=s.toUpperCase(),f=new Set();if(/РОЗЧИН|Р-Н|Р\/Н|Д\/ІН|КОНЦ\.|КОНЦЕНТРАТ/.test(u))f.add("SOL");if(/ТАБЛ|ТАБ[\s.,]/.test(u))f.add("TAB");if(/КАПС/.test(u))f.add("CAP");if(/КРАПЛІ|КР\.ОЧН|ОЧНІ/.test(u))f.add("DRP");if(/СУПОЗИТОР/.test(u))f.add("SUP");if(/ПОРОШОК|ПОР[\s.,]|ПОР\//.test(u))f.add("PWD");if(/ЕМУЛЬС|ЕМУЛ/.test(u))f.add("EMU");if(/АЕРОЗОЛЬ/.test(u))f.add("AER");if(/СУСПЕНЗІЯ|СУСП/.test(u))f.add("SSP");if(/ІНФУЗІЙ|ІНФУЗ/.test(u))f.add("INF");if(/ІНГАЛЯЦІ/.test(u))f.add("INH");if(/ГРАНУЛИ|ГРАН/.test(u))f.add("GRN");if(/МАЗЬ/.test(u))f.add("OIN");return f}
// Container type: syringe vs vial vs amp — these are physically different and must match
function getContainer(s){const u=s.toUpperCase();if(/ШПРИЦ|ШПРИ/.test(u))return"SYR";if(/ФЛАК|ФЛАКОН|ФЛ[\s.,]/.test(u))return"VIAL";return null}
// Pack size filter: if both have explicit №N and they differ, it's a different product
function extractPkStrict(n){const m=n.match(/[№#]\s*(\d+)/);return m?parseInt(m[1]):0}
function getDoses(s){const d=new Set();for(const m of norm(s).matchAll(/(\d+(?:[.,]\d+)?)\s*(МГ|МКГ|МО|%|Г)(?:\/МЛ)?/g)){const v=m[1].replace(",","."),u=m[2];if(u==="Г")try{d.add(String(Math.round(parseFloat(v)*1000))+"МГ")}catch{d.add(v+"Г")}else d.add(v+u)}return d}
function getVolumes(s){const u=s.toUpperCase().replace(/\u00a0/g," "),v=new Set();for(const m of u.matchAll(/(\d+(?:[.,]\d+)?)\s*МЛ/g))v.add(parseFloat(m[1].replace(",",".")));for(const m of u.matchAll(/(\d+(?:[.,]\d+)?)\s*Л[\s.,)]/g))v.add(parseFloat(m[1].replace(",","."))*1000);return v}
function tokMatch(pt,tt){if(!pt.length||!tt.length)return false;const p0=pt[0],t0=tt[0];if(p0===t0)return true;const pp=p0.split("-"),tp=t0.split("-");if((pp.length>1||tp.length>1)&&pp[0]===tp[0]&&pp[0].length>=4)return true;if(p0.length>=6&&t0.startsWith(p0))return true;if(t0.length>=6&&p0.startsWith(t0))return true;const ps=stemUk(p0),ts=stemUk(t0);if(ps===ts&&ps.length>=5)return true;if(ps.length>=5&&ts.startsWith(ps))return true;if(ts.length>=5&&ps.startsWith(ts))return true;if(pp.length>1||tp.length>1){const pps=stemUk(pp[0]),tps=stemUk(tp[0]);if(pps===tps&&pps.length>=4)return true;if(pps.length>=5&&tps.startsWith(pps))return true;if(tps.length>=5&&pps.startsWith(tps))return true}const pn=p0.replace(/И/g,"І"),tn=t0.replace(/И/g,"І");if(pn===tn&&pn.length>=4)return true;if(pn.length>=6&&tn.startsWith(pn))return true;if(tn.length>=6&&pn.startsWith(tn))return true;if(pt.length>=2){const c=pt.slice(0,2).join("-");if(c===t0)return true}if(tt.length>=2){const c=tt.slice(0,2).join("-");if(c===p0)return true}return false}
function setsOverlap(a,b){for(const x of a)if(b.has(x))return true;return false}
const CF=new Set(["SOL","INF","PWD"]);function formsOk(pF,tF){if(!pF.size||!tF.size)return true;if(setsOverlap(pF,tF))return true;return[...pF].some(f=>CF.has(f))&&[...tF].some(f=>CF.has(f))}
function extractPk(n){const m=n.match(/[№#N]\s*(\d+)/);return m?parseInt(m[1]):1}
const PACK_U=new Set(["упк","уп","пач","пак","паков","пачка","упак","упак."]);
const SINGLE_U=new Set(["ампул","капс","капс.","таб","конт","флак","шпр","пляш","шт","штуки","туб","каністр","компл","пар"]);
const T_SINGLE=new Set(["шпр","шприц","фл","фл.","флак","флакон","флк","амп","ампул","ампула","пляш","пляшка","саше","таб","табл","капс","капе","контейнер","штука","туб","супп","кан."]);
function cDate(c){if(!c)return[9999,1,1];let m=c.match(/(?:від|Авд)\s+(\d{1,2})[./](\d{1,2})[./](\d{2,4})/);if(m){let y=parseInt(m[3]);if(y<100)y+=2000;return[y,parseInt(m[2]),parseInt(m[1])]}const mo={"січня":1,"лютого":2,"березня":3,"квітня":4,"травня":5,"червня":6,"липня":7,"серпня":8,"вересня":9,"жовтня":10,"листопада":11,"грудня":12};m=c.match(/від\s+[«"]?(\d{1,2})[»"]?\s+(\w+)\s+(\d{4})/);if(m)return[parseInt(m[3]),mo[m[2].toLowerCase()]||1,parseInt(m[1])];m=c.match(/від\s+(\d{1,2}),(\d{1,2})\s+(\d{4})/);if(m)return[parseInt(m[3]),parseInt(m[2]),parseInt(m[1])];return[9999,1,1]}

function matchAll(purchases,tenders,ov={}){
  const results=[];
  for(const p of purchases){
    const pt=getBrand(p.name),pF=getForm(p.name),pD=getDoses(p.name),pV=getVolumes(p.name);
    const bm=[];for(let i=0;i<tenders.length;i++){const t=tenders[i],tt=getBrand(t.commercial);if(!tokMatch(pt,tt))continue;if(pt.length>=2&&tt.length>=2){const s1=stemUk(pt[1]),s2=stemUk(tt[1]);if(s1.length>=4&&s2.length>=4&&s1!==s2&&!s1.startsWith(s2)&&!s2.startsWith(s1)){const h1=pt[1].split("-")[0],h2=tt[1].split("-")[0];const hs1=stemUk(h1),hs2=stemUk(h2);if(hs1.length>=4&&hs2.length>=4){if(hs1!==hs2&&!hs1.startsWith(hs2)&&!hs2.startsWith(hs1))continue}}}if(!formsOk(pF,getForm(t.commercial)))continue;
    // Container check: syringe vs vial — must match if both specified
    const pCont=getContainer(p.name),tCont=getContainer(t.commercial);if(pCont&&tCont&&pCont!==tCont)continue;
    bm.push(i)}
    let matched=bm;
    // Pack-size filter: if purchase has №N and tender has №M and N≠M, filter out
    const pPk=extractPkStrict(p.name);
    if(matched.length>1&&pPk>1){const pkf=matched.filter(i=>{const tPk=extractPkStrict(tenders[i].commercial);return tPk===0||tPk===pPk});if(pkf.length>0)matched=pkf}
    // Dose filter
    if(matched.length>1){const df=matched.filter(i=>{const tD=getDoses(tenders[i].commercial);if(!pD.size||!tD.size)return true;if(setsOverlap(pD,tD))return true;const pU=new Set([...pD].map(d=>d.replace(/[\d.,]+/,""))),tU=new Set([...tD].map(d=>d.replace(/[\d.,]+/,"")));const sh=[...pU].filter(u=>tU.has(u));if(!sh.length)return true;return setsOverlap(new Set([...pD].filter(d=>sh.some(u=>d.endsWith(u)))),new Set([...tD].filter(d=>sh.some(u=>d.endsWith(u)))))});if(df.length>0)matched=df}
    // Volume filter — apply even for single match (200ml ≠ 100ml)
    if(matched.length>=1&&pV.size){const vf=matched.filter(i=>{const tV=getVolumes(tenders[i].commercial);return!tV.size||setsOverlap(pV,tV)});if(vf.length>0)matched=vf;else if(pV.size)matched=vf}
    const pu=p.unit.toLowerCase().trim().replace(/\.+$/,"");
    let allTI=matched.map(i=>{const t=tenders[i];let tu=(t.unit||"").toLowerCase().trim().replace(/\.+$/,""),tuC=tu;const inn=tu.match(/\((\w+)\)/);if(inn)tuC=inn[1];let cq=t.qty,pk=1;if(SINGLE_U.has(pu)&&PACK_U.has(tuC)&&!T_SINGLE.has(tuC)){const pkP=extractPk(p.name),pkT=extractPk(t.commercial);if(pkP>1)pk=pkP;else if(pkT>1)pk=pkT;if(pk>100)pk=1;if(pk>1)cq=t.qty*pk}return{s:t.supplier,c:t.contract,cn:t.commercial.slice(0,100),mn:t.mnn.slice(0,100),tu:t.unit,tq:t.qty,cq,pk,p:t.price}});
    const uSup=[...new Set(allTI.map(t=>t.s))];const isMulti=uSup.length>1;
    // Override can be: string (legacy priority) or object {supplier: qty} (allocation)
    let tInfo=allTI;
    const ovEntry=isMulti?ov[p.name]:null;
    if(isMulti&&ovEntry&&typeof ovEntry==="object"){
      // Quantity allocation mode: user specified how much from each supplier
      // Keep all suppliers, consumed will be calculated per-supplier below
    }else if(isMulti&&typeof ovEntry==="string"){
      // Legacy priority mode: put chosen supplier first
      const first=allTI.filter(t=>t.s===ovEntry);
      const rest=allTI.filter(t=>t.s!==ovEntry);
      rest.sort((a,b)=>{const da=cDate(a.c),db=cDate(b.c);return da[0]-db[0]||da[1]-db[1]||da[2]-db[2]});
      tInfo=[...first,...rest];
    }
    let consumed=p.qty;
    if(isMulti&&ovEntry&&typeof ovEntry==="object"){
      // Allocation mode: show all suppliers that have allocation > 0 or have remaining
      tInfo=allTI;
      // consumed stays as p.qty — total purchased
    }else if(tInfo.length>1){
      // Cascade consumption
      if(!isMulti||!ovEntry)tInfo.sort((a,b)=>{const da=cDate(a.c),db=cDate(b.c);return da[0]-db[0]||da[1]-db[1]||da[2]-db[2]});
      let left=p.qty;const active=[];
      for(const t of tInfo){
        if(left<=0){active.push(t);continue}
        if(left>=t.cq){left-=t.cq;}
        else{consumed=left;active.push(t);left=0}
      }
      if(active.length>0)tInfo=active;
      else{tInfo=[tInfo[tInfo.length-1]];consumed=p.qty}
    }
    // Compute metrics
    const isAlloc=isMulti&&ovEntry&&typeof ovEntry==="object";
    if(isAlloc){
      // Split into separate results per supplier
      for(const sup of Object.keys(ovEntry)){
        const supQty=ovEntry[sup]||0;
        const supTenders=allTI.filter(t=>t.s===sup);
        if(!supTenders.length)continue;
        const stq=supTenders.reduce((s,t)=>s+t.cq,0);
        const srem=stq>0?stq-supQty:0;
        const spct=stq>0?Math.round(supQty/stq*1000)/10:0;
        const sNow=new Date();let sEarliest=[9999,1,1];supTenders.forEach(t=>{const dd=cDate(t.c);if(dd[0]<sEarliest[0]||(dd[0]===sEarliest[0]&&(dd[1]<sEarliest[1]||(dd[1]===sEarliest[1]&&dd[2]<sEarliest[2]))))sEarliest=dd});
        const scs=sEarliest[0]<9999?new Date(sEarliest[0],sEarliest[1]-1,sEarliest[2]):null;
        const sme=scs?Math.max(1,Math.round((sNow-scs)/(1e3*60*60*24*30.44)*10)/10):3;
        const smr=supQty>0?supQty/sme:0;const sml=stq>0?(smr>0?Math.round(srem/smr*10)/10:999):0;
        let sdu=p.unit,sdpq=supQty,sdtq=stq,sdrem=srem;
        if(supTenders.length&&supTenders[0].pk>1){const pk=supTenders[0].pk;sdu=supTenders[0].tu;sdpq=Math.round(supQty/pk*100)/100;sdtq=supTenders.reduce((ss,t)=>ss+t.tq,0);sdrem=Math.round(srem/pk*100)/100}
        results.push({n:p.name,u:p.unit,du:sdu,pq:supQty,dpq:sdpq,ps:0,t:supTenders,tq:stq,dtq:sdtq,rem:srem,drem:sdrem,pct:spct,ml:sml,multi:uSup,allM:allTI,chosen:ovEntry,alloc:ovEntry});
      }
      // Also add suppliers with 0 allocation that have capacity (for display)
      for(const sup of uSup){
        if(ovEntry[sup]!==undefined)continue;
        const supTenders=allTI.filter(t=>t.s===sup);
        if(!supTenders.length)continue;
        const stq=supTenders.reduce((s,t)=>s+t.cq,0);
        let sdu=p.unit,sdtq=stq;
        if(supTenders.length&&supTenders[0].pk>1){sdu=supTenders[0].tu;sdtq=supTenders.reduce((ss,t)=>ss+t.tq,0)}
        results.push({n:p.name,u:p.unit,du:sdu,pq:0,dpq:0,ps:0,t:supTenders,tq:stq,dtq:sdtq,rem:stq,drem:sdtq,pct:0,ml:999,multi:uSup,allM:allTI,chosen:ovEntry,alloc:ovEntry});
      }
    }else{
    const tq=tInfo.reduce((s,t)=>s+t.cq,0);
    const rem=tq>0?tq-consumed:0,pct=tq>0?Math.round(consumed/tq*1000)/10:0;
    const now=new Date();let earliest=[9999,1,1];tInfo.forEach(t=>{const d=cDate(t.c);if(d[0]<earliest[0]||(d[0]===earliest[0]&&(d[1]<earliest[1]||(d[1]===earliest[1]&&d[2]<earliest[2]))))earliest=d});
    const cs=earliest[0]<9999?new Date(earliest[0],earliest[1]-1,earliest[2]):null;
    const me=cs?Math.max(1,Math.round((now-cs)/(1e3*60*60*24*30.44)*10)/10):3;
    const mr=p.qty>0?p.qty/me:0;const ml=tq>0?(mr>0?Math.round(rem/mr*10)/10:999):0;
    let du=p.unit,dpq=consumed,dtq=tq,drem=rem;
    if(tInfo.length&&tInfo[0].pk>1){const pk=tInfo[0].pk;du=tInfo[0].tu;dpq=Math.round(consumed/pk*100)/100;dtq=tInfo.reduce((s,t)=>s+t.tq,0);drem=Math.round(rem/pk*100)/100}
    results.push({n:p.name,u:p.unit,du,pq:consumed,dpq,ps:p.sum,t:tInfo,tq,dtq,rem,drem,pct,ml,multi:isMulti?uSup:null,allM:isMulti?allTI:null,chosen:isMulti?(ov[p.name]||null):null,alloc:null});
    }
  }
  const used=new Set();results.forEach(r=>r.t.forEach(t=>{for(let i=0;i<tenders.length;i++)if(tenders[i].supplier===t.s&&tenders[i].contract===t.c&&norm(tenders[i].commercial).slice(0,40)===norm(t.cn).slice(0,40))used.add(i)}));
  const um={};for(let i=0;i<tenders.length;i++){if(used.has(i))continue;const t=tenders[i],k=t.commercial.slice(0,60);if(!um[k])um[k]=[];um[k].push(t)}
  for(const[,items]of Object.entries(um)){const t0=items[0];const ti=items.map(t=>({s:t.supplier,c:t.contract,cn:t.commercial.slice(0,100),mn:t.mnn.slice(0,100),tu:t.unit,tq:t.qty,cq:t.qty,pk:1,p:t.price}));const tq=ti.reduce((s,t)=>s+t.cq,0);results.push({n:t0.commercial.slice(0,100),u:t0.unit,du:t0.unit,pq:0,dpq:0,ps:0,t:ti,tq,dtq:tq,rem:tq,drem:tq,pct:0,ml:999,multi:null,allM:null,chosen:null})}
  return results;
}

// ═══════ STATUS ═══════
function gs(d){if(!d.t.length)return"none";if(d.pq===0&&d.tq>0)return"idle";if(d.rem<=0)return"exhausted";if(d.ml>0&&d.ml<3)return"critical";if(d.ml>=3&&d.ml<6)return"warning";return"ok"}
const SO={exhausted:0,critical:1,warning:2,ok:3,idle:4,none:5};
const BARC={exhausted:"#b91c1c",critical:"#f97316",warning:"#eab308",ok:"#10b981",idle:"#8b5cf6",none:"#888"};
const SCOL={all:"var(--accent)",exhausted:"var(--danger)",critical:"var(--orange)",warning:"var(--warn)",ok:"var(--green)",idle:"var(--violet)",none:"var(--muted)"};
const fmt=n=>n==null?"—":Number(n).toLocaleString("uk-UA");
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function hl(text,q){if(!q||!text)return esc(text);const words=q.toLowerCase().split(/\s+/).filter(Boolean);if(!words.length)return esc(text);const re=new RegExp("("+words.map(w=>w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("|")+")","gi");return esc(text).replace(re,"<mark>$1</mark>")}
function multiMatch(text,words){const t=text.toLowerCase();return words.every(w=>t.includes(w))}

// ═══════ LOAD ═══════
async function loadFromDrive(isRefresh){
  if(!isRefresh){const c=loadCache();if(c){allData=c.data;allTenders=c.tenders;overrides=c.overrides||{};lastUpdated=c.ts?new Date(c.ts):null;if(c.purchases)parsedPurchases=c.purchases;showMain();fetchDriveBackground();return}}
  showLoader(isRefresh?"Оновлюємо з Google Drive...":"Завантажуємо з Google Drive...");
  await fetchDriveBackground(true);
}
async function fetchDriveBackground(showErr){
  try{
    const[pB,tB]=await Promise.all([fetch(GDRIVE_P).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.arrayBuffer()}),fetch(GDRIVE_T).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.arrayBuffer()})]);
    purchasesRaw=pB;tendersRaw=tB;
    const p=parsePurchases(pB);const t=parseTenders(tB);
    parsedPurchases=p;allTenders=t;allData=matchAll(p,t,overrides);lastUpdated=new Date();
    overrides=cleanOverrides(allData,overrides);saveCache();showMain();
  }catch(e){if(showErr){document.getElementById("start-error").innerHTML='<div class="err-box">Помилка: '+esc(e.message)+'</div>';showScreen("start")}}
}
function handleFile(file,type){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      if(type==="p"){purchasesRaw=e.target.result;document.getElementById("uz-p").classList.add("done");document.getElementById("uz-p").textContent="✓ "+file.name}
      else{tendersRaw=e.target.result;document.getElementById("uz-t").classList.add("done");document.getElementById("uz-t").textContent="✓ "+file.name}
      if(purchasesRaw&&tendersRaw){
        showLoader("Обробка файлів...");
        setTimeout(()=>{
          const p=parsePurchases(purchasesRaw);const t=parseTenders(tendersRaw);
          parsedPurchases=p;allTenders=t;allData=matchAll(p,t,overrides);lastUpdated=new Date();
          overrides=cleanOverrides(allData,overrides);saveCache();showMain();
        },50);
      }
    }catch(err){document.getElementById("start-error").innerHTML='<div class="err-box">'+esc(err.message)+'</div>'}
  };
  reader.readAsArrayBuffer(file);
}
function showManualUpload(){showScreen("start")}
function showManualFields(){document.getElementById("manual-fields").classList.remove("hidden");document.getElementById("uz-manual").classList.add("hidden")}

// ═══════ OVERRIDE ═══════
function setAllocation(drugName, allocObj){
  // allocObj = {supplier: qty, ...} e.g. {"СТМ": 840, "Галич-Полімед": 0}
  overrides[drugName]=allocObj;
  _rematch();
}
function pickSupplier(drugName,supplier){
  // Legacy: set as priority string
  overrides[drugName]=supplier;
  _rematch();
}
function _rematch(){
  if(purchasesRaw&&tendersRaw){
    const p=parsePurchases(purchasesRaw);const t=parseTenders(tendersRaw);
    parsedPurchases=p;allTenders=t;allData=matchAll(p,t,overrides);
    overrides=cleanOverrides(allData,overrides);
    saveCache();render();
  }else if(parsedPurchases&&allTenders){
    allData=matchAll(parsedPurchases,allTenders,overrides);
    overrides=cleanOverrides(allData,overrides);
    saveCache();render();
  }else{loadFromDrive(true)}
}
function applyAllocFromEl(btn){
  const container=btn.parentElement;
  const inputs=container.querySelectorAll(".alloc-input");
  // Get drug name: decode HTML entities from data-drug attribute
  let drugRaw=container.getAttribute("data-drug")||"";
  if(!drugRaw){
    const card=container.closest(".card")||container.closest(".conflict-card");
    if(card)drugRaw=card.getAttribute("data-drug")||"";
  }
  // Decode entities: &amp; → &, &lt; → <, etc
  const dec=document.createElement("textarea");
  dec.innerHTML=drugRaw;
  const drugName=dec.value;
  if(!drugName)return;
  const alloc={};
  inputs.forEach(inp=>{
    const supRaw=inp.getAttribute("data-sup")||"";
    dec.innerHTML=supRaw;
    const sup=dec.value;
    if(sup)alloc[sup]=parseInt(inp.value)||0;
  });
  setAllocation(drugName,alloc);
}

// ═══════ SEARCH FILTER ═══════
function getActiveSearch(){return pinnedSearch||currentSearch}
function filterData(data){
  const q=getActiveSearch();
  let res=data;
  if(q){const w=q.toLowerCase().split(/\s+/).filter(Boolean);
    if(searchMode==="name")res=res.filter(d=>multiMatch(d.n,w));
    else if(searchMode==="mnn")res=res.filter(d=>d.t.some(t=>multiMatch(t.mn,w)));
    else if(searchMode==="supplier")res=res.filter(d=>d.t.some(t=>multiMatch(t.s,w)));
    else if(searchMode==="contract")res=res.filter(d=>d.t.some(t=>multiMatch(t.c,w)));
  }
  if(currentFilter!=="all")res=res.filter(d=>gs(d)===currentFilter);
  res=[...res];
  if(currentSort==="status")res.sort((x,y)=>(SO[gs(x)]??5)-(SO[gs(y)]??5)||x.n.localeCompare(y.n,"uk"));
  else if(currentSort==="name")res.sort((x,y)=>x.n.localeCompare(y.n,"uk"));
  else if(currentSort==="months")res.sort((x,y)=>(x.ml||999)-(y.ml||999));
  else if(currentSort==="pct")res.sort((x,y)=>(y.pct||0)-(x.pct||0));
  return res;
}

// ═══════ EXPORT ═══════
function exportItems(statuses){
  const items=allData.filter(d=>statuses.includes(gs(d)));
  const rows=[["Назва","МНН","Од.вим.","Закуплено","По угоді","Залишок","% вибірки","Міс. залишок","Постачальник","Угода","Ціна"]];
  items.forEach(d=>{const mnn=d.t.length?d.t[0].mn:"";const sup=d.t.map(t=>t.s).join("; ");const con=d.t.map(t=>t.c).join("; ");const price=d.t.length&&d.t[0].p!=null?d.t[0].p:"";rows.push([d.n,mnn,d.du,d.dpq,d.dtq,d.drem,d.pct,d.ml===999?0:d.ml,sup,con,price])});
  const csv="\uFEFF"+rows.map(r=>r.map(c=>{const s=String(c??"");return s.includes(";")||s.includes('"')||s.includes("\n")?'"'+s.replace(/"/g,'""')+'"':s}).join(";")).join("\n");
  const b64=btoa(unescape(encodeURIComponent(csv)));const a=document.createElement("a");a.href="data:text/csv;base64,"+b64;a.download="export.csv";document.body.appendChild(a);a.click();document.body.removeChild(a);
}

// ═══════ RENDER ═══════
function render(){
  const mc=allData.filter(d=>d.multi&&!d.alloc&&!d.chosen).length;
  const cBtn=document.getElementById("btn-conflicts");
  cBtn.classList.toggle("hidden",mc===0);document.getElementById("conflict-count").textContent=mc;
  updateNavBtns();
  // Pinned search display
  const pw=document.getElementById("pinned-wrap");
  const sw=document.getElementById("search-wrap");
  if(pinnedSearch){
    const mLabel={name:"Назва:",mnn:"МНН:",supplier:"Постач.:",contract:"Угода:"}[searchMode]||"";
    pw.innerHTML='<div class="pinned-tag"><span style="color:var(--muted);font-size:11px">'+mLabel+'</span> <strong>'+esc(pinnedSearch)+'</strong><span class="x" onclick="unpinSearch()">×</span></div>';
    pw.classList.remove("hidden");sw.classList.add("hidden");
  }else{pw.classList.add("hidden");sw.classList.remove("hidden")}

  const el=document.getElementById("main-screen");
  if(currentView==="monitor")renderMonitor(el);
  else if(currentView==="agreements")renderAgreements(el);
  else if(currentView==="conflicts")renderConflicts(el);
}

  // Cards — only show when a filter is selected or search is active

function renderAgreements(el){
  const q=getActiveSearch();
  let agrs={};allTenders.forEach(t=>{const k=t.supplier+"|||"+t.contract;if(!agrs[k])agrs[k]={supplier:t.supplier,contract:t.contract,items:[]};agrs[k].items.push(t)});
  let arr=Object.values(agrs);
  if(q){const w=q.toLowerCase().split(/\s+/).filter(Boolean);
    if(searchMode==="name")arr=arr.filter(a=>a.items.some(i=>multiMatch(i.commercial,w)));
    else if(searchMode==="mnn")arr=arr.filter(a=>a.items.some(i=>multiMatch(i.mnn,w)));
    else if(searchMode==="supplier")arr=arr.filter(a=>multiMatch(a.supplier,w));
    else if(searchMode==="contract")arr=arr.filter(a=>multiMatch(a.contract,w));
  }
  arr.sort((a,b)=>a.supplier.localeCompare(b.supplier,"uk"));
  let h=`<div style="font-size:12px;color:var(--muted);margin-bottom:8px">${arr.length} угод</div>`;
  arr.forEach(a=>{
    const k=a.supplier+"|||"+a.contract;const isE=expandedAgr===k;
    const tv=a.items.reduce((s,i)=>s+((i.price||0)*(i.qty||0)),0);
    h+=`<div class="agr-card${isE?" expanded":""}" onclick="expandedAgr=expandedAgr==='${k.replace(/'/g,"\\'")}'?null:'${k.replace(/'/g,"\\'")}';render()">`;
    h+=`<div class="agr-sup">${hl(a.supplier,searchMode==="supplier"?q:"")}</div>`;
    h+=`<div class="agr-con">${hl(a.contract,searchMode==="contract"?q:"")}</div>`;
    h+=`<div class="agr-meta"><span>Позицій: <strong>${a.items.length}</strong></span>${tv>0?`<span>Сума: <strong>${fmt(Math.round(tv))} грн</strong></span>`:""}</div>`;
    h+=`<div class="agr-detail" onclick="event.stopPropagation()">`;
    a.items.forEach(it=>{
      // Find matched purchase data
      const pm=allData.find(d=>d.t.some(dt=>dt.s===a.supplier&&dt.c===a.contract&&norm(dt.cn).slice(0,60)===norm(it.commercial).slice(0,60)));
      let consDisp=null,remDisp=null,pctDisp=null,dispUnit=it.unit;
      if(pm){const tc=pm.t.find(dt=>dt.s===a.supplier&&dt.c===a.contract&&norm(dt.cn).slice(0,60)===norm(it.commercial).slice(0,60));const pk=tc?tc.pk:1;const consRaw=pm.pq;const consInTU=pk>1?Math.round(consRaw/pk*100)/100:consRaw;const remRaw=tc?(tc.cq-consRaw):it.qty-consRaw;const remInTU=pk>1?Math.round(remRaw/pk*100)/100:remRaw;consDisp=consInTU;remDisp=remInTU;pctDisp=pm.pct;if(pk>1)dispUnit=it.unit}
      h+=`<div class="agr-item"><div class="name">${hl(it.commercial.slice(0,100),searchMode==="name"?q:"")}</div>`;
      h+=`<div class="mnn">${hl(it.mnn.slice(0,80),searchMode==="mnn"?q:"")}</div>`;
      h+=`<div class="row"><span>К-сть:</span><strong>${fmt(it.qty)} ${esc(dispUnit)}</strong></div>`;
      if(it.price!=null)h+=`<div class="row"><span>Ціна:</span><strong>${fmt(it.price)} грн</strong></div>`;
      if(consDisp!=null){h+=`<div class="row"><span>Вибрано:</span><strong style="color:${remDisp<=0?"var(--danger)":"var(--green)"}">${fmt(consDisp)} (зал: ${fmt(remDisp)})</strong></div>`;if(pctDisp!=null)h+=`<div class="row"><span>Вибірка:</span><strong style="color:${pctDisp>=100?"var(--danger)":pctDisp>=80?"var(--warn)":"var(--green)"}">${pctDisp}%</strong></div>`}
      else h+=`<div style="font-size:11px;color:var(--muted);font-style:italic;margin-top:2px">Не знайдено в закупівлях</div>`;
      h+=`</div>`;
    });
    h+=`</div></div>`;
  });
  el.innerHTML=h;
}

function renderConflicts(el){
  const conflicts=allData.filter(d=>d.multi&&!d.alloc);
  if(!conflicts.length){el.innerHTML='<div class="empty-state">Немає конфліктів</div>';return}
  let h='<div class="conflict-banner">⚡ Розподіліть закупівлі по постачальниках. Вкажіть кількість для кожного.</div>';
  conflicts.forEach((d,ci)=>{
    const allocData=d.alloc||{};
    h+=`<div class="conflict-card" data-drug="${esc(d.n)}"><div class="conflict-drug">${esc(d.n)}</div><div class="conflict-meta">Закуплено: ${fmt(d.pq)} ${esc(d.u)}</div>`;
    d.multi.forEach(sup=>{
      const supItems=d.allM.filter(t=>t.s===sup);
      const maxQty=supItems.reduce((s,t)=>s+t.cq,0);
      const curVal=allocData[sup]||0;
      h+=`<div class="conflict-opt"><div style="flex:1"><div class="name">${esc(sup)}</div><div class="info">${supItems.map(t=>esc(t.cn)).join("; ").slice(0,80)}</div><div class="info">В угоді: ${fmt(maxQty)} ${esc(d.u)}</div></div><input class="alloc-input" type="number" min="0" max="${maxQty}" value="${curVal}" data-sup="${esc(sup)}" onclick="event.stopPropagation()"></div>`;
    });
    h+=`<button class="alloc-apply" onclick="applyAllocFromEl(this)">Застосувати</button>`;
    h+=`</div>`;
  });
  el.innerHTML=h;
}

(function(){
  const c=loadCache();
  if(c){allData=c.data;allTenders=c.tenders;overrides=c.overrides||{};lastUpdated=c.ts?new Date(c.ts):null;
    if(c.purchases)parsedPurchases=c.purchases;
    showMain();fetchDriveBackground();
  }
})();
</script>
